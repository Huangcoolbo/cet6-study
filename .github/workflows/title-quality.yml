name: Title Quality Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main
      - master
      - '**'

jobs:
  validator-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run title validator regression samples
        shell: pwsh
        run: ./scripts/test-validate-title.ps1

  pr-title:
    if: github.event_name == 'pull_request'
    needs: validator-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        shell: pwsh
        run: ./scripts/validate-title.ps1 -Kind pr -Title @'
${{ github.event.pull_request.title }}
'@

  commit-titles:
    if: github.event_name == 'push'
    needs: validator-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate pushed commit titles
        shell: pwsh
        run: |
          $before = '${{ github.event.before }}'
          $after = '${{ github.sha }}'
          if ($before -eq '0000000000000000000000000000000000000000') {
            Write-Host 'Initial push detected; validating the head commit title only.'
            $subjects = git log --format=%s -n 1 $after
          }
          else {
            $subjects = git log --format=%s "$before..$after"
          }

          if (-not $subjects) {
            Write-Host 'No commit subjects found for this push.'
            exit 0
          }

          $subjects -split "`n" | ForEach-Object {
            $title = $_.Trim()
            if ($title) {
              ./scripts/validate-title.ps1 -Kind commit -Title $title
            }
          }
      - name: Export pushed commit title audit summary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $before = '${{ github.event.before }}'
          $after = '${{ github.sha }}'
          if ($before -eq '0000000000000000000000000000000000000000') {
            ./scripts/audit-title-history.ps1 -Count 1 -AsJson | Set-Content -Path artifacts/title-audit-summary.json -Encoding utf8
            ./scripts/audit-title-history.ps1 -Count 1 -AsMarkdown -Compact | Set-Content -Path artifacts/title-audit-summary.md -Encoding utf8
            ./scripts/audit-title-history.ps1 -Count 1 -AsMarkdown | Set-Content -Path artifacts/title-audit-details.md -Encoding utf8
          }
          else {
            ./scripts/audit-title-history.ps1 -RevisionRange "$before..$after" -AsJson | Set-Content -Path artifacts/title-audit-summary.json -Encoding utf8
            ./scripts/audit-title-history.ps1 -RevisionRange "$before..$after" -AsMarkdown -Compact | Set-Content -Path artifacts/title-audit-summary.md -Encoding utf8
            ./scripts/audit-title-history.ps1 -RevisionRange "$before..$after" -AsMarkdown | Set-Content -Path artifacts/title-audit-details.md -Encoding utf8
          }
      - name: Append pushed commit title audit summary to workflow run
        shell: pwsh
        run: |
          Get-Content artifacts/title-audit-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
      - name: Upload pushed commit title audit summary
        uses: actions/upload-artifact@v4
        with:
          name: title-audit-summary
          path: |
            artifacts/title-audit-summary.json
            artifacts/title-audit-summary.md
            artifacts/title-audit-details.md
          if-no-files-found: error
